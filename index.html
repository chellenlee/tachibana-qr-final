<script>
let firestore;
let staff = '';
let selectedLocationId = '';
let selectedLocationName = '';
let codeReader = null;
let locations = []; 
let allScanDataForReport = [];

// 今回の固定部門
const TARGET_DIVISIONS = ['E', 'L', 'M', 'S'];

const firebaseConfig = {
  apiKey: "AIzaSyD_Aic5iQ7OYGO9qTv0patspCKbwsuYcs8",
  authDomain: "tachibana-wangan.firebaseapp.com",
  projectId: "tachibana-wangan",
  storageBucket: "tachibana-wangan.firebasestorage.app",
  messagingSenderId: "963128842192",
  appId: "1:963128842192:web:5ee0eb05d3df5e7c63cbd5"
};

async function initializeAppLogic() {
  const savedStaff = localStorage.getItem('staffName');
  const savedLocationId = localStorage.getItem('locationId');
  
  if (savedStaff) document.getElementById('staffName').value = savedStaff;

  const locationSelect = document.getElementById('location');
  locationSelect.innerHTML = '<option value="">地点マスター読込中...</option>';
  locationSelect.disabled = true;

  try {
    const snapshot = await firestore.collection("locations_master_spring")
                                    .orderBy("id", "asc")
                                    .get();

    if (snapshot.empty) {
      console.error("地点マスターが空です。");
      locationSelect.innerHTML = '<option value="">地点取得失敗</option>';
      return;
    }

    locations = [];
    locationSelect.innerHTML = '<option value="">地点を選択</option>';

    snapshot.forEach(doc => {
      const loc = doc.data();
      locations.push(loc); 
      const option = document.createElement('option');
      option.value = loc.id;
      option.textContent = loc.name;
      locationSelect.appendChild(option);
    });
    
    if (savedLocationId) {
      locationSelect.value = savedLocationId;
    }
  } catch (err) {
    console.error("地点マスターの読み込みに失敗しました:", err);
    locationSelect.innerHTML = '<option value="">読込エラー</option>';
  } finally {
    locationSelect.disabled = false;
  }
}

function startApp() {
  staff = document.getElementById('staffName').value.trim();
  const locationId = document.getElementById('location').value;

  if (!staff || !locationId) {
    showCustomPopup({
      title: "確認",
      message: "担当者名と地点を入力・選択してください。",
      buttons: [{ text: "OK", value: true }]
    });
    return;
  }
  
  localStorage.setItem('staffName', staff);
  selectedLocationId = locationId;
  selectedLocationName = locations.find(loc => loc.id == locationId).name;
  localStorage.setItem('locationId', selectedLocationId);
  localStorage.setItem('locationName', selectedLocationName); 

  document.getElementById('setup').style.display = 'none';
  document.getElementById('reader').style.display = '';
  document.getElementById('result').style.display = '';

  startScanner();
}

function startRetireScan() {
  staff = document.getElementById('staffName').value.trim();
  if (!staff) {
    showCustomPopup({
      title: "確認",
      message: "担当者名を入力してください。",
      buttons: [{ text: "OK", value: true }]
    });
    return;
  }
  localStorage.setItem('staffName', staff);
  selectedLocationId = '99';
  const retireLoc = locations.find(loc => String(loc.id) === '99');
  selectedLocationName = retireLoc ? retireLoc.name : "リタイヤ";

  document.getElementById('setup').style.display = 'none';
  document.getElementById('reader').style.display = '';
  document.getElementById('result').style.display = '';

  startScanner();
}

async function showHistory() {
  const staffInput = document.getElementById('staffName').value.trim();
  if (!staffInput) {
    showCustomPopup({
      title: "確認",
      message: "履歴を表示するには、担当者名を入力してください。",
      buttons: [{ text: "OK", value: true }]
    });
    return;
  }
  if (codeReader) codeReader.reset();

  document.getElementById('setup').style.display = 'none';
  document.getElementById('reader').style.display = 'none'; 
  document.getElementById('result').style.display = 'none';
  document.getElementById('history-view').style.display = 'block';
  document.getElementById('history-staff-display').textContent = staffInput;
  
  const listDiv = document.getElementById('history-list');
  listDiv.innerHTML = 'データを取得中...';

  try {
    const snapshot = await firestore.collection('scans_spring_2026')
      .where('staff', '==', staffInput)
      .get();

    if (snapshot.empty) {
      listDiv.innerHTML = '<p>読み取り履歴はありません。</p>';
      return;
    }

    let docs = snapshot.docs.map(doc => doc.data());
    docs.sort((a, b) => {
      const tA = a.scanTimestamp ? a.scanTimestamp.toMillis() : 0;
      const tB = b.scanTimestamp ? b.scanTimestamp.toMillis() : 0;
      return tB - tA; 
    });

    let html = '<table class="history-table">';
    html += '<tr><th>地点</th><th>部門</th><th>No.</th><th>氏名</th><th>時間</th></tr>';
    
    docs.forEach(d => {
      const displayTime = d.time || '--:--:--';
      html += `<tr>
        <td style="text-align:left;">${d.name}</td>
        <td>${d.division}</td>
        <td>${d.bibNumber}</td>
        <td style="text-align:left;">${d.runnerName}</td>
        <td>${displayTime}</td>
      </tr>`;
    });
    html += '</table>';
    html += `<p style="text-align:right; font-size:14px;">件数: ${docs.length}件</p>`;
    listDiv.innerHTML = html;
  } catch (error) {
    console.error("履歴取得エラー:", error);
    listDiv.innerHTML = '<p style="color:red;">履歴の取得に失敗しました。</p>';
  }
}

function closeHistory() {
  document.getElementById('history-view').style.display = 'none';
  document.getElementById('setup').style.display = '';
}

async function showStats() {
  document.getElementById('setup').style.display = 'none';
  document.getElementById('stats-view').style.display = 'block';

  const listDiv = document.getElementById('stats-list');
  listDiv.innerHTML = '全データを解析・集計中...';

  try {
    const snapshot = await firestore.collection('scans_spring_2026').get();
    
    const locIndexMap = {};
    locations.forEach((loc, index) => {
      locIndexMap[String(loc.id)] = index;
    });

    const statsMap = {};
    locations.forEach((_, i) => {
      statsMap[i] = { E: 0, L: 0, M: 0, S: 0, total: 0, retire: 0 };
    });

    const runnerStatus = {};

    snapshot.forEach(doc => {
      const d = doc.data();
      const bib = d.bibNumber;
      const lid = String(d.id);
      const isRetire = (lid === '99' || (d.name && (d.name.includes('リタイヤ') || d.name.includes('リタイア'))));
      const locIdx = locIndexMap[lid];
      
      let div = d.division;
      if (!TARGET_DIVISIONS.includes(div)) div = 'other';

      if (!runnerStatus[bib]) {
        runnerStatus[bib] = { div: div, maxIdx: -1, isRetire: false };
      }

      if (isRetire) {
        runnerStatus[bib].isRetire = true;
      } else if (locIdx !== undefined) {
        if (locIdx > runnerStatus[bib].maxIdx) {
          runnerStatus[bib].maxIdx = locIdx;
        }
      }
    });

    // ワープ補完を含めた集計処理
    Object.values(runnerStatus).forEach(r => {
      if (r.maxIdx >= 0) {
        for (let i = 0; i <= r.maxIdx; i++) {
          if (statsMap[i]) {
            if (r.div !== 'other' && statsMap[i][r.div] !== undefined) {
              statsMap[i][r.div]++;
            }
            statsMap[i].total++;
          }
        }
      }
      if (r.isRetire) {
        let nextLoc = r.maxIdx + 1;
        if (statsMap[nextLoc]) statsMap[nextLoc].retire++;
      }
    });

    let html = '<table class="stats-table">';
    html += '<tr><th style="min-width:11em;">地点</th>';
    TARGET_DIVISIONS.forEach(div => { html += `<th>${div}</th>`; });
    html += '<th>計</th><th>未</th><th>リ</th></tr>';

    const startLocId = "2";
    const startLocIdx = locIndexMap[startLocId];
    const startRunnerCount = (startLocIdx !== undefined) ? statsMap[startLocIdx].total : 0;
    let cumulativeRetire = 0;

    locations.forEach((loc, index) => {
      if (String(loc.id) === '99' || loc.name.includes("リタイヤ") || loc.name.includes("リタイア")) return;

      const passedTotal = statsMap[index].total;
      const retiredHere = statsMap[index].retire;
      cumulativeRetire += retiredHere;

      let unpassed = 0;
      if (index >= startLocIdx) {
        unpassed = startRunnerCount - passedTotal - cumulativeRetire;
        if (unpassed < 0) unpassed = 0;
      }

      html += `<tr>
        <td style="min-width:11em; max-width:11em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; text-align:left;">${loc.name}</td>`;
      
      TARGET_DIVISIONS.forEach(div => {
        html += `<td>${statsMap[index][div]}</td>`;
      });
        
      html += `
        <td style="font-weight:bold; color:blue;">${passedTotal}</td>
        <td style="color:red;">${(index >= startLocIdx) ? unpassed : '-'}</td>
        <td>${retiredHere > 0 ? '+' + retiredHere : 0}</td>
      </tr>`;
    });

    html += '</table>';
    html += `<p style="text-align:right; font-size:14px; color:#666;">※未通過 = スタート総数 - (通過計 + 累計リタイヤ)</p>`;
    listDiv.innerHTML = html;

  } catch (error) {
    console.error("集計エラー:", error);
    listDiv.innerHTML = '<p style="color:red;">データの集計に失敗しました。</p>';
  }
}

function closeStats() {
  document.getElementById('stats-view').style.display = 'none';
  document.getElementById('setup').style.display = '';
}

async function showReport() {
  document.getElementById('setup').style.display = 'none';
  document.getElementById('report-view').style.display = 'block';

  const listDiv = document.getElementById('report-list');
  listDiv.innerHTML = '全データを解析中...';
  
  const select = document.getElementById('report-division-select');
  select.innerHTML = '<option value="">部門を抽出中...</option>';

  try {
    const snapshot = await firestore.collection('scans_spring_2026').get();
    if (snapshot.empty) {
      listDiv.innerHTML = '<p>データがありません。</p>';
      select.innerHTML = '<option value="">データなし</option>';
      return;
    }

    const locationIndexMap = {};
    locations.forEach((loc, index) => {
      locationIndexMap[String(loc.id)] = index;
    });
    const startLocationId = "2";
    const runnerMap = new Map();

    snapshot.forEach(doc => {
      const d = doc.data();
      const bib = d.bibNumber;
      const lid = String(d.id);
      const isRetire = (lid === '99' || (d.name && (d.name.includes('リタイヤ') || d.name.includes('リタイア'))));
      const currentIndex = locationIndexMap[lid] !== undefined ? locationIndexMap[lid] : -1;
      const scanDate = d.scanTimestamp ? d.scanTimestamp.toDate() : null;

      if (!runnerMap.has(bib)) {
        runnerMap.set(bib, {
          latestNormalData: null,
          startScanTime: null,
          retireData: null,
          _locationIndex: -1
        });
      }
      
      const entry = runnerMap.get(bib);

      if (isRetire) {
        if (!entry.retireData || (scanDate && entry.retireData.scanTimestamp && scanDate > entry.retireData.scanTimestamp.toDate())) {
          entry.retireData = d;
        }
      } else {
        if (lid === startLocationId) {
          entry.startScanTime = scanDate;
        }
        if (currentIndex > entry._locationIndex) {
          entry.latestNormalData = d;
          entry._locationIndex = currentIndex;
        } else if (currentIndex === entry._locationIndex && entry.latestNormalData) {
           const currentTs = scanDate ? scanDate.getTime() : 0;
           const existingTs = entry.latestNormalData.scanTimestamp ? entry.latestNormalData.scanTimestamp.toMillis() : 0;
           if (currentTs > existingTs) {
             entry.latestNormalData = d;
           }
        }
      }
    });

    allScanDataForReport = Array.from(runnerMap.values())
      .map(entry => {
        let targetData = entry.latestNormalData || entry.retireData;
        if (!targetData) return null;

        return {
          ...targetData,
          _realStartTime: entry.startScanTime,
          _locationIndex: entry._locationIndex,
          _isDNF: !!entry.retireData,
          _retireData: entry.retireData
        };
      }).filter(d => d !== null);

    const divisions = new Set(allScanDataForReport.map(d => d.division));
    const sortedDivisions = Array.from(divisions).sort();
    
    select.innerHTML = '<option value="">部門を選択...</option>';
    sortedDivisions.forEach(div => {
      const opt = document.createElement('option');
      opt.value = div;
      opt.textContent = div;
      select.appendChild(opt);
    });
    listDiv.innerHTML = '<p>上のボックスから部門を選択してください。</p>';

  } catch (error) {
    console.error("速報データ取得エラー:", error);
    listDiv.innerHTML = '<p style="color:red;">データの取得に失敗しました。</p>';
  }
}

function calculateElapsedTime(currentDateObj, startScanDateObj) {
  if (!currentDateObj || !startScanDateObj) return "--:--";
  
  // 1時間単位の丸め処理 (10分までは切り捨て、11分以降は切り上げ)
  let startH = startScanDateObj.getHours();
  let startM = startScanDateObj.getMinutes();
  if (startM >= 11) {
    startH += 1;
  }
  let roundedStart = new Date(startScanDateObj);
  roundedStart.setHours(startH, 0, 0, 0);

  const diffMs = currentDateObj.getTime() - roundedStart.getTime();
  if (diffMs < 0) return "Start前"; 
  
  const diffHrs = Math.floor(diffMs / (1000 * 60 * 60));
  const diffMins = Math.floor((diffMs % (1000 * 60 * 60)) / (1000 * 60));
  const hStr = String(diffHrs).padStart(2, '0');
  const mStr = String(diffMins).padStart(2, '0');
  return `${hStr}:${mStr}`;
}

function updateReportView() {
  const select = document.getElementById('report-division-select');
  const selectedDiv = select.value;
  const listDiv = document.getElementById('report-list');

  if (!selectedDiv) {
    listDiv.innerHTML = '<p>部門を選択してください。</p>';
    return;
  }

  if (typeof allScanDataForReport === 'undefined') {
    return;
  }

  let filtered = allScanDataForReport.filter(d => d.division === selectedDiv);

  filtered.sort((a, b) => {
    if (b._locationIndex !== a._locationIndex) {
      return b._locationIndex - a._locationIndex; 
    }
    const tA = a.scanTimestamp ? a.scanTimestamp.toMillis() : 0;
    const tB = b.scanTimestamp ? b.scanTimestamp.toMillis() : 0;
    return tA - tB; 
  });

  let html = '<table class="report-table">';
  html += '<tr><th>順位</th><th>No.</th><th>氏名</th><th>地点</th><th>通過</th><th>経過</th></tr>';

  filtered.forEach((d, index) => {
    let elapsedTime = "--:--";
    let passageLabel = "--:--";

    if (d._isDNF) {
      elapsedTime = "DNF";
      const retDate = d._retireData.scanTimestamp ? d._retireData.scanTimestamp.toDate() : null;
      if (retDate) {
        passageLabel = `${retDate.getDate()}日<br>${String(retDate.getHours()).padStart(2, '0')}:${String(retDate.getMinutes()).padStart(2, '0')}`;
      } else {
        passageLabel = d._retireData.time || "リタイヤ";
      }
    } else {
      const currentObj = d.scanTimestamp ? d.scanTimestamp.toDate() : null;
      if (currentObj && d._realStartTime) {
        elapsedTime = calculateElapsedTime(currentObj, d._realStartTime);
      } else if (!d._realStartTime) {
        elapsedTime = "Start未"; 
      }

      if (currentObj) {
        passageLabel = `${currentObj.getDate()}日<br>${String(currentObj.getHours()).padStart(2, '0')}:${String(currentObj.getMinutes()).padStart(2, '0')}`; 
      } else {
        passageLabel = d.time || "";
      }
    }

    html += `<tr>
      <td style="font-weight:bold;">${index + 1}</td> <td>${d.bibNumber}</td>
      <td style="text-align:left;">
        <a href="#" onclick="showRunnerDetail('${d.bibNumber}'); return false;" style="color: blue; text-decoration: underline;">${d.runnerName}</a>
      </td>
      <td style="text-align:left;">${d._isDNF ? d._retireData.name : d.name}</td>
      <td style="font-size: 14px; line-height: 1.2;">${passageLabel}</td>
      <td style="font-weight:bold;">${elapsedTime}</td>
    </tr>`;
  });
  html += '</table>';
  html += `<p style="text-align:right; font-size:14px;">該当: ${filtered.length}名</p>`;
  listDiv.innerHTML = html;
}

function closeReport() {
  document.getElementById('report-view').style.display = 'none';
  document.getElementById('setup').style.display = '';
}

async function showRunnerDetail(bib) {
  document.getElementById('report-view').style.display = 'none';
  document.getElementById('runner-detail-view').style.display = 'block';
  
  document.getElementById('detail-runner-info').innerHTML = `ゼッケン: ${bib} のデータを取得中...`;
  document.getElementById('detail-list').innerHTML = '';

  try {
    const snapshot = await firestore.collection('scans_spring_2026')
      .where('bibNumber', '==', bib)
      .get();

    if (snapshot.empty) {
      document.getElementById('detail-list').innerHTML = '<p>データが見つかりません。</p>';
      return;
    }

    let docs = snapshot.docs.map(doc => doc.data());
    
    // スタート時刻を取得
    let startDoc = docs.find(d => String(d.id) === "2");
    let startScanDateObj = startDoc && startDoc.scanTimestamp ? startDoc.scanTimestamp.toDate() : null;

    const locIndexMap = {};
    locations.forEach((loc, index) => { locIndexMap[String(loc.id)] = index; });

    // 地点の降順、同地点なら時刻の降順
    docs.sort((a, b) => {
      let idxA = locIndexMap[String(a.id)] !== undefined ? locIndexMap[String(a.id)] : 999;
      let idxB = locIndexMap[String(b.id)] !== undefined ? locIndexMap[String(b.id)] : 999;
      if (idxB !== idxA) return idxB - idxA; 
      
      let tA = a.scanTimestamp ? a.scanTimestamp.toMillis() : 0;
      let tB = b.scanTimestamp ? b.scanTimestamp.toMillis() : 0;
      return tB - tA; 
    });

    let runnerName = docs[0].runnerName;
    let division = docs[0].division;

    document.getElementById('detail-runner-name').textContent = `${runnerName} さん`;
    document.getElementById('detail-runner-info').innerHTML = `部門: ${division} / No: ${bib}`;

    let html = '<table class="report-table">';
    html += '<tr><th>地点</th><th>通過時刻</th><th>経過時間</th></tr>';

    docs.forEach(d => {
      let dTime = d.time || '--:--:--';
      if (d.scanTimestamp) {
        const dt = d.scanTimestamp.toDate();
        dTime = `${dt.getDate()}日 ${String(dt.getHours()).padStart(2, '0')}:${String(dt.getMinutes()).padStart(2, '0')}`;
      }

      let eTime = "--:--";
      let isRetire = (String(d.id) === '99' || (d.name && (d.name.includes('リタイヤ') || d.name.includes('リタイア'))));

      if (isRetire) {
        eTime = "DNF";
      } else if (startScanDateObj && d.scanTimestamp) {
        eTime = calculateElapsedTime(d.scanTimestamp.toDate(), startScanDateObj);
      } else if (!startScanDateObj) {
        eTime = "Start未";
      }

      html += `<tr>
        <td style="text-align:left;">${d.name}</td>
        <td>${dTime}</td>
        <td style="font-weight:bold;">${eTime}</td>
      </tr>`;
    });
    html += '</table>';
    document.getElementById('detail-list').innerHTML = html;

  } catch(e) {
    console.error("詳細取得エラー", e);
    document.getElementById('detail-list').innerHTML = '<p style="color:red;">データ取得に失敗しました</p>';
  }
}

function closeRunnerDetail() {
  document.getElementById('runner-detail-view').style.display = 'none';
  document.getElementById('report-view').style.display = 'block';
}

async function showRetireList() {
  document.getElementById('setup').style.display = 'none';
  document.getElementById('retire-list-view').style.display = 'block';

  const listDiv = document.getElementById('retire-list-content');
  listDiv.innerHTML = '全データを解析してリタイヤ状況を取得中...';

  try {
    const snapshot = await firestore.collection('scans_spring_2026').get();
    if (snapshot.empty) {
      listDiv.innerHTML = '<p>データがありません。</p>';
      return;
    }

    const runners = {};
    snapshot.forEach(doc => {
      const d = doc.data();
      const bib = d.bibNumber;
      const lid = String(d.id);
      const isRetire = (lid === '99' || (d.name && (d.name.includes('リタイヤ') || d.name.includes('リタイア'))));

      if (!runners[bib]) {
        runners[bib] = { retireData: null, lastNormalData: null };
      }
      if (isRetire) {
        runners[bib].retireData = d;
      } else {
        const currentLast = runners[bib].lastNormalData;
        const thisTime = d.scanTimestamp ? d.scanTimestamp.toMillis() : 0;
        const lastTime = (currentLast && currentLast.scanTimestamp) ? currentLast.scanTimestamp.toMillis() : -1;
        if (thisTime > lastTime) {
          runners[bib].lastNormalData = d;
        }
      }
    });

    const retireList = [];
    Object.keys(runners).forEach(bib => {
      const r = runners[bib];
      if (r.retireData) {
        retireList.push({
          ...r.retireData,
          _lastLocationName: r.lastNormalData ? r.lastNormalData.name : 'Start前'
        });
      }
    });

    if (retireList.length === 0) {
      listDiv.innerHTML = '<p>リタイヤ登録されたデータはありません。</p>';
      return;
    }
    
    retireList.sort((a, b) => {
      const tA = a.scanTimestamp ? a.scanTimestamp.toMillis() : 0;
      const tB = b.scanTimestamp ? b.scanTimestamp.toMillis() : 0;
      return tB - tA; 
    });

    let html = '<table class="retire-table">';
    html += '<tr><th>部門</th><th>No.</th><th>氏名</th><th>最終通過</th><th>日時</th><th>位置</th></tr>';

    retireList.forEach(d => {
      let locationLink = "ー";
      if (d.latitude && d.longitude) {
        const mapUrl = `https://www.google.com/maps?q=${d.latitude},${d.longitude}`;
        locationLink = `<a href="${mapUrl}" target="_blank" style="text-decoration:underline; color:blue; cursor:pointer;">📍確認</a>`;
      }
      html += `<tr>
        <td>${d.division}</td>
        <td>${d.bibNumber}</td>
        <td style="text-align:left;">${d.runnerName}</td>
        <td style="font-weight:bold; color:#555;">${d._lastLocationName}</td>
        <td>${d.date}<br>${d.time}</td>
        <td>${locationLink}</td>
      </tr>`;
    });
    html += '</table>';
    html += `<p style="text-align:right; font-size:14px;">合計: ${retireList.length}名</p>`;
    listDiv.innerHTML = html;

  } catch (error) {
    console.error("リタイヤ一覧取得エラー:", error);
    listDiv.innerHTML = '<p style="color:red;">データの取得に失敗しました。</p>';
  }
}

function closeRetireList() {
  document.getElementById('retire-list-view').style.display = 'none';
  document.getElementById('setup').style.display = '';
}

function getLocation() {
  return new Promise((resolve) => {
    if (!navigator.geolocation) {
      console.warn("Geolocation is not supported by this browser.");
      resolve(null);
      return;
    }
    navigator.geolocation.getCurrentPosition(
      (position) => {
        resolve({
          lat: position.coords.latitude,
          lng: position.coords.longitude
        });
      },
      (error) => {
        console.warn("位置情報の取得に失敗:", error.message);
        resolve(null); 
      },
      { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
    );
  });
}
  
function startScanner() {
  const video = document.getElementById('video');
  if (!codeReader) {
    codeReader = new ZXing.BrowserQRCodeReader();
  }
  document.getElementById('message').textContent = '読み取り中...';

  codeReader.decodeFromVideoDevice(undefined, video, async (result, err) => { 
    if (result) {
      codeReader.reset(); 
      
      const text = result.text.trim();
      const parts = text.split('/');
      
      if (parts.length >= 4) {
        const [rawDivision, bibNumber, runnerName, gender, startTime = ''] = parts;
        
        // データの正規化処理（全角→半角、スペース削除、大文字化）
        let cleanDivision = String(rawDivision).normalize('NFKC').replace(/[\s　]+/g, "").toUpperCase();

        let locData = null;

        if (selectedLocationId == '99') {
          document.getElementById('message').textContent = '位置情報取得中...';
          locData = await getLocation();
        }

        document.getElementById('message').textContent = '読み取り成功';
        const scanTimeObject = new Date();
        
        const scanData = {
          id: selectedLocationId,
          name: selectedLocationName,
          division: cleanDivision,
          bibNumber,
          runnerName,
          gender,
          startTime,
          latitude: locData ? locData.lat : null,
          longitude: locData ? locData.lng : null,
          
          scanTimestamp: firebase.firestore.Timestamp.fromDate(scanTimeObject),
          date: scanTimeObject.toLocaleDateString('ja-JP'),
          time: scanTimeObject.toLocaleTimeString('ja-JP'),
          staff,
          serverTimestamp: firebase.firestore.FieldValue.serverTimestamp()
        };

        showPopup(scanData); 
      } else {
        document.getElementById('message').textContent = '無効なQRコードです';
        setTimeout(startScanner, 1000);
      }
    }
  }, { video: { facingMode: "environment" } });
}

function showPopup(scanData) {
  const overlay = document.getElementById('popup-overlay');
  const title = document.getElementById('popup-title');
  const info = document.getElementById('popup-info');
  const popup = document.getElementById('popup');

  title.textContent = "チェックOK";
  title.style.color = "green";

  info.innerHTML = `
    地点：${scanData.name}<br>
    部門：${scanData.division}<br>
    ゼッケン：${scanData.bibNumber}<br>
    氏名：${scanData.runnerName}
  `;

  popup.querySelectorAll('button').forEach(btn => btn.remove());

  const okBtn = document.createElement('button');
  okBtn.textContent = "OK";
  okBtn.onclick = () => {
    uploadToFirebase(scanData); 
    continueScan(); 
  };
  popup.appendChild(okBtn);

  const endBtn = document.createElement('button');
  endBtn.textContent = "終了";
  endBtn.onclick = endApp;
  popup.appendChild(endBtn);

  overlay.style.display = 'flex';
}

function continueScan() {
  document.getElementById('popup-overlay').style.display = 'none';
  startScanner(); 
}

function endApp() {
  if (codeReader) {
    codeReader.reset();
  }
  document.getElementById('popup-overlay').style.display = 'none';
  document.getElementById('setup').style.display = '';
  document.getElementById('reader').style.display = 'none';
  document.getElementById('result').style.display = 'none';
}

async function uploadToFirebase(data) {
  if (!firestore) {
    console.error("Firestore is not initialized.");
    document.getElementById('message').textContent = 'DB未接続エラー'; 
    return;
  }

  const docId = `${data.id}_${data.bibNumber}`;
  const docRef = firestore.collection("scans_spring_2026").doc(docId);

  try {
    let exists = false;

    try {
      const docSnap = await docRef.get();
      exists = docSnap.exists;
    } catch (e) {
      console.warn("重複チェックスキップ（オフラインまたはエラー）:", e);
      exists = false;
    }

    if (exists) {
      console.warn("Already exists:", docId);
      document.getElementById('message').textContent = `${data.bibNumber} は読み取り済み`;
      return; 
    }

    await docRef.set(data, { merge: true });
    
    console.log("Data saved (Offline/Online):", docId);
    document.getElementById('message').textContent = `${data.bibNumber} 保存完了`;

    if (String(data.id) === '99' || data.name.includes("リタイヤ") || data.name.includes("リタイア")) {
      firestore.collection('broadcast').doc('latest_retire').set({
        bibNumber: data.bibNumber,
        runnerName: data.runnerName,
        locationName: data.name,
        time: data.time,
        staff: data.staff,
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
      }).catch((err) => {
        console.warn("速報送信保留:", err);
      });
    }

  } catch (error) {
    console.error("Save failed: ", error);
    document.getElementById('message').textContent = `保存失敗: ${error.message}`;
  }
}


function showCustomPopup({ title = "", message = "", buttons = [], callback = null }) {
  const overlay = document.getElementById('popup-overlay');
  const popup = document.getElementById('popup');
  const titleElem = document.getElementById('popup-title');
  const infoElem = document.getElementById('popup-info');

  titleElem.textContent = title;
  titleElem.style.color = (title === "エラー" ? "red" : ""); 
  infoElem.innerHTML = message;

  popup.querySelectorAll('button').forEach(btn => btn.remove());

  buttons.forEach(({ text, value }) => {
    const btn = document.createElement('button');
    btn.textContent = text;
    btn.onclick = () => {
      overlay.style.display = 'none';
      if (callback) callback(value);
    };
    popup.appendChild(btn);
  });

  overlay.style.display = 'flex';
}

let lastProcessedRetireTime = 0; 
const appStartTime = new Date().getTime() - (5 * 60 * 1000); 

function startRetireListener() {
  firestore.collection('broadcast').doc('latest_retire')
    .onSnapshot((doc) => {
      if (!doc.exists) return;
      
      const d = doc.data();
      
      let alertTime = 0;
      if (!d.timestamp) {
        alertTime = new Date().getTime();
      } else {
        alertTime = d.timestamp.toMillis();
      }

      const now = new Date().getTime();
      const isRecent = alertTime > appStartTime;
      const isWithin10Mins = (now - alertTime) < 10 * 60 * 1000; 
      
      if (isRecent && isWithin10Mins && alertTime > lastProcessedRetireTime) {
        lastProcessedRetireTime = alertTime;
        showRetireAlert(d);
      }
    }, (error) => {
      console.error("速報受信エラー:", error);
    });
}

function showRetireAlert(data) {
  if (navigator.vibrate) {
    navigator.vibrate([500, 200, 500, 200, 500]); 
  }
  showCustomPopup({
    title: "⚠ リタイヤ速報",
    message: `
      <div style="text-align:center; margin: 10px 0;">
        <span style="font-size:32px; color:red; font-weight:bold;">No.${data.bibNumber}</span><br>
        <span style="font-size:24px; font-weight:bold;">${data.runnerName} さん</span>
        <hr style="margin:10px 0;">
        <div style="font-size:18px; color:#333;">
          場所: <strong>${data.locationName}</strong><br>
          担当: ${data.staff}<br>
          <span style="font-size:14px; color:#888;">${data.time}</span>
        </div>
      </div>
    `,
    buttons: [{ text: "確認しました", value: true }]
  });
}

try {
  firebase.initializeApp(firebaseConfig);
  firestore = firebase.firestore();
  
  firestore.enablePersistence({ synchronizeTabs: true })
    .catch((err) => {
      if (err.code == 'failed-precondition') {
        console.error("複数タブエラー:", err);
        showCustomPopup({
          title: "⚠ 警告",
          message: `
            <div style="text-align:left; font-size:18px;">
              <strong>アプリが複数のタブで開かれています。</strong><br><br>
              データの保存に失敗する恐れがあります。<br>
              不要なタブを全て閉じてから、このページを<strong>再読み込み</strong>してください。
            </div>
          `,
          buttons: [{ text: "再読み込み", value: true }],
          callback: () => { window.location.reload(); }
        });
        document.getElementById('message').textContent = '⚠ 複数タブで起動中';
        document.getElementById('message').style.color = 'red';
      } else if (err.code == 'unimplemented') {
        console.log('ブラウザがオフライン保存に対応していません');
      }
    });

  setTimeout(() => {
    initializeAppLogic();
    startRetireListener(); 
  }, 300);

} catch (e) {
  console.error("Firebase initialization error:", e);
  alert("データベースの初期化に失敗しました。");
  initializeAppLogic();
}
