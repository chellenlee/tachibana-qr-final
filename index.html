<script>
let firestore;
let staff = '';
let selectedLocationId = '';
let selectedLocationName = '';
let codeReader = null;
let locations = []; 
let allScanDataForReport = [];

const TARGET_DIVISIONS = ['E', 'L', 'M', 'S'];

const firebaseConfig = {
  apiKey: "AIzaSyD_Aic5iQ7OYGO9qTv0patspCKbwsuYcs8",
  authDomain: "tachibana-wangan.firebaseapp.com",
  projectId: "tachibana-wangan",
  storageBucket: "tachibana-wangan.firebasestorage.app",
  messagingSenderId: "963128842192",
  appId: "1:963128842192:web:5ee0eb05d3df5e7c63cbd5"
};

async function initializeAppLogic() {
  const savedStaff = localStorage.getItem('staffName');
  const savedLocationId = localStorage.getItem('locationId');
  if (savedStaff) document.getElementById('staffName').value = savedStaff;

  const locationSelect = document.getElementById('location');
  locationSelect.innerHTML = '<option value="">地点マスター読込中...</option>';
  locationSelect.disabled = true;

  try {
    const snapshot = await firestore.collection("locations_master_spring").orderBy("id", "asc").get();
    if (snapshot.empty) {
      locationSelect.innerHTML = '<option value="">地点取得失敗</option>';
      return;
    }

    locations = [];
    locationSelect.innerHTML = '<option value="">地点を選択</option>';

    snapshot.forEach(doc => {
      const loc = doc.data();
      locations.push(loc); 
      const option = document.createElement('option');
      option.value = loc.id;
      option.textContent = loc.name;
      locationSelect.appendChild(option);
    });
    if (savedLocationId) locationSelect.value = savedLocationId;
  } catch (err) {
    console.error("地点マスターの読み込みに失敗:", err); // 修正：エラーログ出力
    locationSelect.innerHTML = '<option value="">読込エラー</option>';
  } finally {
    locationSelect.disabled = false;
  }
}

function startApp() {
  staff = document.getElementById('staffName').value.trim();
  const locationId = document.getElementById('location').value;

  if (!staff || !locationId) {
    showCustomPopup({ title: "確認", message: "担当者名と地点を入力してください。", buttons: [{ text: "OK", value: true }] });
    return;
  }
  
  localStorage.setItem('staffName', staff);
  selectedLocationId = locationId;
  selectedLocationName = locations.find(loc => loc.id == locationId).name;
  localStorage.setItem('locationId', selectedLocationId);
  localStorage.setItem('locationName', selectedLocationName); 

  document.getElementById('setup').style.display = 'none';
  document.getElementById('reader').style.display = 'block';
  document.getElementById('result').style.display = 'block';
  startScanner();
}

function startRetireScan() {
  staff = document.getElementById('staffName').value.trim();
  if (!staff) {
    showCustomPopup({ title: "確認", message: "担当者名を入力してください。", buttons: [{ text: "OK", value: true }] });
    return;
  }
  localStorage.setItem('staffName', staff);
  selectedLocationId = '99';
  const retireLoc = locations.find(loc => String(loc.id) === '99');
  selectedLocationName = retireLoc ? retireLoc.name : "リタイヤ";

  document.getElementById('setup').style.display = 'none';
  document.getElementById('reader').style.display = 'block';
  document.getElementById('result').style.display = 'block';
  startScanner();
}

// 修正：スキャナの確実な終了
function endApp() {
  if (codeReader) {
    codeReader.reset();
  }
  document.getElementById('setup').style.display = 'block';
  document.getElementById('reader').style.display = 'none';
  document.getElementById('result').style.display = 'none';
}

function getEffectiveStartTime(docs) {
  let startDoc = docs.find(d => String(d.id) === "2");
  
  // ▼ 実績スタートあり：ユーザー指定の「1時間丸め処理」を適用
  if (startDoc && startDoc.scanTimestamp) {
    let sDate = startDoc.scanTimestamp.toDate();
    let startH = sDate.getHours();
    let startM = sDate.getMinutes();
    if (startM >= 11) startH += 1;
    let roundedStart = new Date(sDate);
    roundedStart.setHours(startH, 0, 0, 0);
    return { time: roundedStart, isKari: false, label: `${String(startH).padStart(2, '0')}:00` };
  }

  // ▼ 実績なし、QR仮時間あり：最初に読み取られた地点の日付 ＋ QRの時刻
  let anyDoc = docs[0];
  if (anyDoc && anyDoc.qrStartTime) {
    // 最も古い読み取り記録を探す（これが「最初に読み取られた地点」）
    let earliestDoc = docs.reduce((prev, curr) => {
      let pt = prev.scanTimestamp ? prev.scanTimestamp.toMillis() : Infinity;
      let ct = curr.scanTimestamp ? curr.scanTimestamp.toMillis() : Infinity;
      return pt < ct ? prev : curr;
    }, docs[0]);
    
    if (earliestDoc && earliestDoc.scanTimestamp) {
      let baseDate = earliestDoc.scanTimestamp.toDate();
      let [qH, qM] = anyDoc.qrStartTime.split(':').map(Number);
      
      // 読み取られた「日付」に、ゼッケンの「時刻」を付与
      let kariDate = new Date(baseDate);
      kariDate.setHours(qH, qM, 0, 0);
      
      // ※深夜またぎ対策：QR時刻が「22:00」で、最初の読み取りが「翌朝02:00」だった場合、
      // そのままくっつけると「翌日の22:00」になって未来の時間になるため、1日前に戻す
      if (kariDate > baseDate) { 
        kariDate.setDate(kariDate.getDate() - 1); 
      }
      
      return { time: kariDate, isKari: true, label: `${anyDoc.qrStartTime}(仮)` };
    }
  }
  
  // ▼ どちらも無い場合
  return { time: null, isKari: false, label: "Start無" };
}

function calculatePace(timeMs, distKm) {
  if (distKm <= 0 || timeMs <= 0) return "-";
  let paceMin = (timeMs / (1000 * 60)) / distKm;
  let pMin = Math.floor(paceMin);
  let pSec = Math.floor((paceMin - pMin) * 60);
  // 幅を節約するため、末尾の "/km" を削除しました
  return `${pMin}'${String(pSec).padStart(2, '0')}"`;
}

function formatElapsed(diffMs) {
  if (diffMs < 0) return "Err"; 
  const diffHrs = Math.floor(diffMs / (1000 * 60 * 60));
  const diffMins = Math.floor((diffMs % (1000 * 60 * 60)) / (1000 * 60));
  // 秒単位の計算を追加しました
  const diffSecs = Math.floor((diffMs % (1000 * 60)) / 1000);
  // HH:MM:SS のフォーマットで出力します
  return `${String(diffHrs).padStart(2, '0')}:${String(diffMins).padStart(2, '0')}:${String(diffSecs).padStart(2, '0')}`;
}

async function showRunnerDetail(bib) {
  document.getElementById('report-view').style.display = 'none';
  document.getElementById('runner-detail-view').style.display = 'block';
  document.getElementById('detail-runner-info').innerHTML = `ゼッケン: ${bib} のデータを取得中...`;
  document.getElementById('detail-list').innerHTML = '';

  try {
    const snapshot = await firestore.collection('scans_spring_2026').where('bibNumber', '==', bib).get();
    if (snapshot.empty) { document.getElementById('detail-list').innerHTML = '<p>データが見つかりません。</p>'; return; }

    let docs = snapshot.docs.map(doc => doc.data());
    let division = docs[0].division;
    let runnerName = docs[0].runnerName;
    
    let targetLocs = locations.filter(l => l.divisions && l.divisions.includes(division) && String(l.id) !== "1" && String(l.id) !== "99");
    targetLocs.sort((a, b) => (a.distances[division] || 0) - (b.distances[division] || 0));

    let effStart = getEffectiveStartTime(docs);
    let startLabelClass = effStart.isKari ? "kari-text" : "";

    document.getElementById('detail-runner-name').textContent = `${runnerName} `;
    document.getElementById('detail-runner-info').innerHTML = `部門: ${division} / No: ${bib} / Start: <span class="${startLabelClass}">${effStart.label}</span>`;

    let isDNF = docs.some(d => String(d.id) === '99');
    let maxDistPassed = 0;
    let overallAvgPaceRaw = 0;
    let latestPassedTime = 0;

    targetLocs.forEach(loc => {
      let scan = docs.find(d => String(d.id) === String(loc.id));
      if (scan && scan.scanTimestamp && effStart.time) {
        let dist = loc.distances[division] || 0;
        let ts = scan.scanTimestamp.toMillis();
        if (dist > maxDistPassed) {
          maxDistPassed = dist;
          latestPassedTime = ts;
          overallAvgPaceRaw = (ts - effStart.time.getTime()) / dist;
        }
      }
    });

    let html = '<table class="detail-table"><tr><th>地点</th><th>距離</th><th>通過時刻</th><th>区間ペース</th><th>ペース</th><th>経過</th></tr>';
    let prevDist = 0;
    let prevTimeMs = effStart.time ? effStart.time.getTime() : 0;

    targetLocs.forEach((loc) => {
      let scan = docs.find(d => String(d.id) === String(loc.id));
      let dist = loc.distances[division] || 0;
      let distStr = dist.toFixed(1);
      let passTimeStr = "--:--";
      let secPaceStr = "-";
      let totPaceStr = "-";
      let elapsedStr = "--:--";
      let isEta = false;

      if (scan && scan.scanTimestamp) {
        let ts = scan.scanTimestamp.toMillis();
        let dt = scan.scanTimestamp.toDate();
        passTimeStr = `${dt.getDate()}日 ${String(dt.getHours()).padStart(2, '0')}:${String(dt.getMinutes()).padStart(2, '0')}`;
        
        if (effStart.time) {
          elapsedStr = formatElapsed(ts - effStart.time.getTime());
          totPaceStr = calculatePace(ts - effStart.time.getTime(), dist);
          if (dist > prevDist) secPaceStr = calculatePace(ts - prevTimeMs, dist - prevDist);
        }
        prevDist = dist;
        prevTimeMs = ts;
      } else {
        if (isDNF) {
          passTimeStr = "DNF";
        } else if (effStart.time && dist > maxDistPassed && overallAvgPaceRaw > 0) {
          isEta = true;
          let etaMs = effStart.time.getTime() + (dist * overallAvgPaceRaw);
          let etaDt = new Date(etaMs);
          passTimeStr = `${etaDt.getDate()}日 ${String(etaDt.getHours()).padStart(2, '0')}:${String(etaDt.getMinutes()).padStart(2, '0')}`;
          
          let estElapsed = etaMs - effStart.time.getTime();
          elapsedStr = formatElapsed(estElapsed);
          totPaceStr = calculatePace(estElapsed, dist);
          secPaceStr = calculatePace(etaMs - prevTimeMs, dist - prevDist);
          
          prevDist = dist;
          prevTimeMs = etaMs;
        } else {
          passTimeStr = "-";
        }
      }

      let rowClass = isEta ? ' class="eta-text"' : '';
      html += `<tr${rowClass}>
        <td style="text-align:left;">${loc.name}</td>
        <td>${distStr}</td>
        <td>${passTimeStr}</td>
        <td style="font-size:11px;">${secPaceStr}</td>
        <td style="font-size:11px;">${totPaceStr}</td>
        <td style="font-weight:bold;">${elapsedStr}</td>
      </tr>`;
    });

    html += '</table><p style="text-align:right; font-size:12px; color:#888;">※赤字は総合平均ペースからの予測</p>';
    document.getElementById('detail-list').innerHTML = html;

  } catch(e) {
    console.error("詳細情報取得エラー:", e); // 修正
    document.getElementById('detail-list').innerHTML = '<p style="color:red;">データ取得失敗</p>';
  }
}

function closeRunnerDetail() {
  document.getElementById('runner-detail-view').style.display = 'none';
  document.getElementById('report-view').style.display = 'block';
}

async function showReport() {
  if (codeReader) codeReader.reset();
  document.getElementById('setup').style.display = 'none';
  document.getElementById('reader').style.display = 'none';
  document.getElementById('report-view').style.display = 'block';
  
  // 画面を開くたびに検索窓をリセットする
  document.getElementById('report-search-input').value = '';
  
  const listDiv = document.getElementById('report-list');
  listDiv.innerHTML = '全データを解析中...';
  const select = document.getElementById('report-division-select');
  select.innerHTML = '<option value="">部門を抽出中...</option>';

  try {
    const snapshot = await firestore.collection('scans_spring_2026').get();
    if (snapshot.empty) { listDiv.innerHTML = '<p>データなし</p>'; select.innerHTML = '<option value="">データなし</option>'; return; }

    const locIndexMap = {}; locations.forEach((loc, index) => { locIndexMap[String(loc.id)] = index; });
    const runnerMap = new Map();

    snapshot.forEach(doc => {
      const d = doc.data();
      const bib = d.bibNumber;
      const lid = String(d.id);
      const isRetire = String(lid) === '99';
      const currentIndex = locIndexMap[lid] !== undefined ? locIndexMap[lid] : -1;

      if (!runnerMap.has(bib)) runnerMap.set(bib, { docs: [], latestNormalData: null, retireData: null, _locationIndex: -1 });
      const entry = runnerMap.get(bib);
      entry.docs.push(d);

      if (isRetire) {
        if (!entry.retireData || (d.scanTimestamp && entry.retireData.scanTimestamp && d.scanTimestamp.toMillis() > entry.retireData.scanTimestamp.toMillis())) {
          entry.retireData = d;
        }
      } else {
        if (currentIndex > entry._locationIndex) {
          entry.latestNormalData = d;
          entry._locationIndex = currentIndex;
        } else if (currentIndex === entry._locationIndex && entry.latestNormalData) {
           if (d.scanTimestamp && entry.latestNormalData.scanTimestamp && d.scanTimestamp.toMillis() > entry.latestNormalData.scanTimestamp.toMillis()) {
             entry.latestNormalData = d;
           }
        }
      }
    });

    allScanDataForReport = Array.from(runnerMap.values()).map(entry => {
      let targetData = entry.latestNormalData || entry.retireData;
      if (!targetData) return null;
      let effStart = getEffectiveStartTime(entry.docs);
      return { ...targetData, _effStart: effStart, _locationIndex: entry._locationIndex, _isDNF: !!entry.retireData, _retireData: entry.retireData };
    }).filter(d => d !== null);

    const divisions = new Set(allScanDataForReport.map(d => d.division));
    const sortedDivisions = Array.from(divisions).sort();
    
    select.innerHTML = '<option value="">部門を選択...</option>';
    sortedDivisions.forEach(div => { select.appendChild(new Option(div, div)); });
    listDiv.innerHTML = '<p>部門を選択するか、No.や氏名で検索してください。</p>';
  } catch (error) {
    console.error("速報取得エラー:", error);
    listDiv.innerHTML = '<p style="color:red;">取得失敗</p>';
  }
}

function updateReportView() {
  const select = document.getElementById('report-division-select');
  const selectedDiv = select.value;
  const searchInput = document.getElementById('report-search-input').value.trim().toLowerCase();
  const listDiv = document.getElementById('report-list');

  // 部門も検索ワードも空の場合はメッセージを出して終了
  if (!selectedDiv && !searchInput) { 
    listDiv.innerHTML = '<p>部門を選択するか、No.や氏名で検索してください。</p>'; 
    return; 
  }

  let filtered = allScanDataForReport;

  // 部門が選択されていれば、その部門で絞り込み
  if (selectedDiv) {
    filtered = filtered.filter(d => d.division === selectedDiv);
  }

  // 検索ワードがあれば、No.または氏名（小文字区別なし）で部分一致検索
  if (searchInput) {
    filtered = filtered.filter(d => 
      String(d.bibNumber).includes(searchInput) || 
      String(d.runnerName).toLowerCase().includes(searchInput)
    );
  }

  if (filtered.length === 0) {
    listDiv.innerHTML = '<p>該当するランナーが見つかりません。</p>';
    return;
  }

  filtered.sort((a, b) => {
    if (b._locationIndex !== a._locationIndex) return b._locationIndex - a._locationIndex; 
    const tA = a.scanTimestamp ? a.scanTimestamp.toMillis() : 0;
    const tB = b.scanTimestamp ? b.scanTimestamp.toMillis() : 0;
    return tA - tB; 
  });

  let html = '<table class="report-table"><tr><th>順位</th><th>No.</th><th>氏名</th><th>地点</th><th>通過</th><th>経過</th></tr>';

  filtered.forEach((d, index) => {
    let elapsedTime = "--:--";
    let passageLabel = "--:--";

    if (d._isDNF) {
      elapsedTime = "DNF";
      const retDate = d._retireData.scanTimestamp ? d._retireData.scanTimestamp.toDate() : null;
      passageLabel = retDate ? `${retDate.getDate()}日<br>${String(retDate.getHours()).padStart(2, '0')}:${String(retDate.getMinutes()).padStart(2, '0')}` : "リタイヤ";
    } else {
      const currentObj = d.scanTimestamp ? d.scanTimestamp.toDate() : null;
      if (currentObj && d._effStart.time) {
        elapsedTime = formatElapsed(currentObj.getTime() - d._effStart.time.getTime());
      } else if (!d._effStart.time) {
        elapsedTime = "Start無"; 
      }
      passageLabel = currentObj ? `${currentObj.getDate()}日<br>${String(currentObj.getHours()).padStart(2, '0')}:${String(currentObj.getMinutes()).padStart(2, '0')}` : (d.time || "");
    }

    let startKariClass = (d._effStart.isKari && !d._isDNF) ? "kari-text" : "";
    let eTimeHtml = d._effStart.isKari && !d._isDNF ? `<span class="${startKariClass}">${elapsedTime}</span>` : elapsedTime;

    html += `<tr>
      <td style="font-weight:bold;">${index + 1}</td> <td>${d.bibNumber}</td>
      <td style="text-align:left;"><a href="#" onclick="showRunnerDetail('${d.bibNumber}'); return false;" style="color: blue; text-decoration: underline;">${d.runnerName}</a></td>
      <td style="text-align:left;">${d._isDNF ? d._retireData.name : d.name}</td>
      <td style="font-size: 14px; line-height: 1.2;">${passageLabel}</td>
      <td style="font-weight:bold;">${eTimeHtml}</td>
    </tr>`;
  });
  html += '</table>';
  html += `<p style="text-align:right; font-size:14px;">該当: ${filtered.length}名</p>`;
  listDiv.innerHTML = html;
}

async function showStats() {
  if (codeReader) codeReader.reset(); // カメラ解放
  document.getElementById('setup').style.display = 'none';
  document.getElementById('reader').style.display = 'none';
  document.getElementById('stats-view').style.display = 'block';
  const listDiv = document.getElementById('stats-list');
  listDiv.innerHTML = '全データを解析・集計中...';

  try {
    const snapshot = await firestore.collection('scans_spring_2026').get();
    const locIndexMap = {}; locations.forEach((loc, index) => { locIndexMap[String(loc.id)] = index; });
    const statsMap = {};
    
    locations.forEach((_, i) => { 
      statsMap[i] = { E: 0, L: 0, M: 0, S: 0, total: 0, retire: 0, retireDiv: { E: 0, L: 0, M: 0, S: 0 } }; 
    });

    const runnerStatus = {};
    snapshot.forEach(doc => {
      const d = doc.data();
      const bib = d.bibNumber;
      const lid = String(d.id);
      const isRetire = String(lid) === '99';
      const locIdx = locIndexMap[lid];
      
      let div = d.division;
      if (!TARGET_DIVISIONS.includes(div)) div = 'other';

      if (!runnerStatus[bib]) runnerStatus[bib] = { div: div, maxIdx: -1, isRetire: false };
      if (isRetire) runnerStatus[bib].isRetire = true;
      else if (locIdx !== undefined && locIdx > runnerStatus[bib].maxIdx) runnerStatus[bib].maxIdx = locIdx;
    });

    Object.values(runnerStatus).forEach(r => {
      if (r.maxIdx >= 0) {
        for (let i = 0; i <= r.maxIdx; i++) {
          if (statsMap[i]) {
            const loc = locations[i];
            if (!loc.divisions || loc.divisions.includes(r.div)) {
              if (r.div !== 'other' && statsMap[i][r.div] !== undefined) statsMap[i][r.div]++;
              statsMap[i].total++;
            }
          }
        }
      }
      if (r.isRetire) {
        let nextLoc = -1;
        for (let i = r.maxIdx + 1; i < locations.length; i++) {
          const l = locations[i];
          if (String(l.id) !== '99' && (!l.divisions || l.divisions.includes(r.div))) {
            nextLoc = i;
            break;
          }
        }
        if (nextLoc !== -1 && statsMap[nextLoc]) {
          statsMap[nextLoc].retire++;
          if (r.div !== 'other' && statsMap[nextLoc].retireDiv[r.div] !== undefined) {
            statsMap[nextLoc].retireDiv[r.div]++;
          }
        }
      }
    });

    let html = '<div style="overflow-x: auto;"><table class="stats-table">';
    html += '<tr>';
    html += '<th rowspan="2" style="padding: 4px; vertical-align: middle;">地点</th>';
    html += '<th colspan="4" style="border-bottom: 1px solid #ccc; padding: 4px; text-align: center;">未通過数</th>';
    html += '<th rowspan="2" style="padding: 4px 1px; vertical-align: middle; white-space: nowrap; min-width: 2.5em;">通過</th>';
    html += '<th rowspan="2" style="padding: 4px 1px; vertical-align: middle; white-space: nowrap; min-width: 2.5em;">未通過</th>';
    html += '<th rowspan="2" style="padding: 4px 1px; vertical-align: middle; line-height: 1.2; min-width: 2.5em;">リタ<br>イヤ</th>';
    html += '</tr><tr>';
    TARGET_DIVISIONS.forEach(div => { html += `<th style="padding: 4px 1px; text-align: center; min-width: 2.2em;">${div}</th>`; });
    html += '</tr>';

    const startLocIdx = locIndexMap["2"];
    
    // みなし出走数（システムが認知しているユニークランナー数）を計算の母数にする
    const startCount = { E: 0, L: 0, M: 0, S: 0, total: 0 };
    Object.values(runnerStatus).forEach(r => {
      if (r.div !== 'other' && startCount[r.div] !== undefined) {
        startCount[r.div]++;
      }
      startCount.total++;
    });

    let cumulativeRetire = { E: 0, L: 0, M: 0, S: 0, total: 0 };

    locations.forEach((loc, index) => {
      if (String(loc.id) === '99') return;
      const passedTotal = statsMap[index].total;
      
      cumulativeRetire.total += statsMap[index].retire;
      TARGET_DIVISIONS.forEach(div => { cumulativeRetire[div] += statsMap[index].retireDiv[div]; });

      let unpassedTotal = 0;
      let unpassedDiv = { E: '-', L: '-', M: '-', S: '-' };

      if (index >= startLocIdx) {
        TARGET_DIVISIONS.forEach(div => {
          const isValid = (!loc.divisions || loc.divisions.includes(div));
          if (isValid) {
            let unp = startCount[div] - statsMap[index][div] - cumulativeRetire[div];
            unpassedDiv[div] = unp < 0 ? 0 : unp;
            unpassedTotal += unpassedDiv[div]; 
          } else {
            unpassedDiv[div] = 0; 
          }
        });
      }

      html += `<tr><td style="text-align: left; padding: 4px; line-height: 1.3;">${loc.name}</td>`;
      
      TARGET_DIVISIONS.forEach(div => { 
        const isValid = (!loc.divisions || loc.divisions.includes(div));
        if (!isValid) {
          html += `<td style="color:#aaa; font-weight:normal; white-space:nowrap;">0</td>`; 
        } else if (index === startLocIdx) {
          // スタート地点の表示も「みなし出走数」を表示して矛盾をなくす
          html += `<td style="color:blue; font-weight:bold; white-space:nowrap;">${startCount[div]}</td>`; 
        } else {
          html += `<td style="color:red; font-weight:bold; white-space:nowrap;">${unpassedDiv[div]}</td>`; 
        }
      });
      
      // スタート地点の「通過（計）」も「みなし出走数」にする
      const displayPassedTotal = (index === startLocIdx) ? startCount.total : passedTotal;
      html += `<td style="color:blue; font-weight:bold; white-space:nowrap;">${displayPassedTotal}</td>`;
      html += `<td style="color:red; font-weight:bold; white-space:nowrap;">${(index >= startLocIdx) ? unpassedTotal : '-'}</td>`;
      html += `<td style="color:black; font-weight:bold; white-space:nowrap;">${statsMap[index].retire > 0 ? '+' + statsMap[index].retire : 0}</td></tr>`;
    });

    html += '</table></div>';
    html += '<p style="text-align:right; font-size:12px; color:#666;">※スタート地点は出走数(青字)、以降は未通過数(赤字)です。<br>未通過数 ＝ 出走数 － (通過数 ＋ 累計リタイヤ)</p>';
    listDiv.innerHTML = html;
  } catch (error) {
    console.error("集計エラー:", error);
    listDiv.innerHTML = '<p style="color:red;">データの集計に失敗しました。</p>';
  }
}

  if (codeReader) codeReader.reset(); // 修正：カメラ解放

  document.getElementById('setup').style.display = 'none';
  document.getElementById('reader').style.display = 'none'; 
  document.getElementById('result').style.display = 'none';
  document.getElementById('history-view').style.display = 'block';
  document.getElementById('history-staff-display').textContent = staffInput;
  
  const listDiv = document.getElementById('history-list');
  listDiv.innerHTML = 'データを取得中...';

  try {
    const snapshot = await firestore.collection('scans_spring_2026').where('staff', '==', staffInput).get();

    docs.forEach(d => {

    html += `</table><p style="text-align:right; font-size:14px;">件数: ${docs.length}件</p>`;
    listDiv.innerHTML = html;
  } catch (error) {
    console.error("履歴取得エラー:", error);

async function showRetireList() {
  if (codeReader) codeReader.reset(); // 修正：カメラ解放
  document.getElementById('setup').style.display = 'none';
  document.getElementById('reader').style.display = 'none';
  document.getElementById('retire-list-view').style.display = 'block';
  const listDiv = document.getElementById('retire-list-content');
  listDiv.innerHTML = 'データを取得中...';

  try {
    const snapshot = await firestore.collection('scans_spring_2026').get();
    if (snapshot.empty) { listDiv.innerHTML = '<p>データがありません。</p>'; return; }

    const runners = {};
    snapshot.forEach(doc => {
      const d = doc.data();
      const bib = d.bibNumber;
      if (!runners[bib]) runners[bib] = { retireData: null, lastNormalData: null };
      if (String(d.id) === '99') {
        runners[bib].retireData = d;
      } else {
        const currentLast = runners[bib].lastNormalData;
        const thisTime = d.scanTimestamp ? d.scanTimestamp.toMillis() : 0;
        const lastTime = (currentLast && currentLast.scanTimestamp) ? currentLast.scanTimestamp.toMillis() : -1;
        if (thisTime > lastTime) runners[bib].lastNormalData = d;
      }
    });

    const retireList = [];
    Object.keys(runners).forEach(bib => {
      const r = runners[bib];
      if (r.retireData) retireList.push({ ...r.retireData, _lastLocationName: r.lastNormalData ? r.lastNormalData.name : 'Start無' });
    });

    if (retireList.length === 0) { listDiv.innerHTML = '<p>リタイヤ登録はありません。</p>'; return; }
    
    retireList.sort((a, b) => {
      const tA = a.scanTimestamp ? a.scanTimestamp.toMillis() : 0;
      const tB = b.scanTimestamp ? b.scanTimestamp.toMillis() : 0;
      return tB - tA; 
    });

    let html = '<table class="retire-table"><tr><th>部門</th><th>No.</th><th>氏名</th><th>最終通過</th><th>日時</th><th>位置</th></tr>';
    retireList.forEach(d => {
      let locationLink = "ー";
      if (d.latitude && d.longitude) {
        locationLink = `<a href="https://www.google.com/maps?q=${d.latitude},${d.longitude}" target="_blank" style="text-decoration:underline; color:blue;">📍確認</a>`;
      }
      html += `<tr><td>${d.division}</td><td>${d.bibNumber}</td><td style="text-align:left;">${d.runnerName}</td><td style="font-weight:bold; color:#555;">${d._lastLocationName}</td><td>${d.date}<br>${d.time}</td><td>${locationLink}</td></tr>`;
    });
    html += `</table><p style="text-align:right; font-size:14px;">合計: ${retireList.length}名</p>`;
    listDiv.innerHTML = html;
  } catch (error) {
    console.error("リタイヤリスト取得エラー:", error);
    listDiv.innerHTML = '<p style="color:red;">データの取得に失敗しました。</p>';
  }
}

  document.getElementById('setup').style.display = 'block';
}

function getLocation() {
  return new Promise((resolve) => {
    if (!navigator.geolocation) { resolve(null); return; }
    navigator.geolocation.getCurrentPosition(
      (position) => { resolve({ lat: position.coords.latitude, lng: position.coords.longitude }); },
      (error) => { resolve(null); },
      { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
    );
  });
}

function startScanner() {
  const video = document.getElementById('video');
  if (!codeReader) codeReader = new ZXing.BrowserQRCodeReader();
  document.getElementById('message').textContent = '読み取り中...';

  codeReader.decodeFromVideoDevice(undefined, video, async (result, err) => { 
    if (result) {
      codeReader.reset(); 
      const parts = result.text.trim().split('/');
      
      // 修正：必須項目の厳密なバリデーション
      if (parts.length >= 4 && parts[1] && parts[2]) {
        const [rawDivision, bibNumber, runnerName, gender, rawStartTime = ''] = parts;
        let cleanDivision = String(rawDivision).normalize('NFKC').replace(/[\s　]+/g, "").toUpperCase();
        
        let cleanStartTime = "";
        const timeMatch = rawStartTime.match(/(\d{1,2})[-:](\d{2})/);
        if (timeMatch) {
          cleanStartTime = `${timeMatch[1].padStart(2, '0')}:${timeMatch[2]}`;
        }

        let locData = null;
        if (selectedLocationId == '99') {
          document.getElementById('message').textContent = '位置情報取得中...';
          locData = await getLocation();
        }

        document.getElementById('message').textContent = '読み取り成功';
        const scanTimeObject = new Date();
        
        const scanData = {
          id: selectedLocationId,
          name: selectedLocationName,
          division: cleanDivision,
          bibNumber,
          runnerName,
          gender,
          qrStartTime: cleanStartTime,
          latitude: locData ? locData.lat : null,
          longitude: locData ? locData.lng : null,
          scanTimestamp: firebase.firestore.Timestamp.fromDate(scanTimeObject),
          date: scanTimeObject.toLocaleDateString('ja-JP'),
          time: scanTimeObject.toLocaleTimeString('ja-JP'),
          staff,
          serverTimestamp: firebase.firestore.FieldValue.serverTimestamp()
        };
        showPopup(scanData); 
      } else {
        document.getElementById('message').textContent = '無効なQRコードです';
        setTimeout(startScanner, 1500);
      }
    }
  }, { video: { facingMode: "environment" } });
}

function showPopup(scanData) {
  const overlay = document.getElementById('popup-overlay');
  document.getElementById('popup-title').textContent = "チェックOK";
  document.getElementById('popup-title').style.color = "green";
  document.getElementById('popup-info').innerHTML = `地点：${scanData.name}<br>部門：${scanData.division}<br>ゼッケン：${scanData.bibNumber}<br>氏名：${scanData.runnerName}`;

  const popup = document.getElementById('popup');
  popup.querySelectorAll('button').forEach(btn => btn.remove());

  const okBtn = document.createElement('button');
  okBtn.textContent = "OK";
  
  // 修正：保存中メッセージを表示し、保存完了後に再スタート
  okBtn.onclick = async () => { 
    document.getElementById('popup-overlay').style.display = 'none'; 
    document.getElementById('message').textContent = '保存中...';
    await uploadToFirebase(scanData); 
  };
  popup.appendChild(okBtn);

  const endBtn = document.createElement('button');
  endBtn.textContent = "キャンセル";
  endBtn.onclick = () => { 
    document.getElementById('popup-overlay').style.display = 'none'; 
    startScanner(); 
  };
  popup.appendChild(endBtn);
  overlay.style.display = 'flex';
}

// 修正：トランザクションを用いた完全な重複防止
async function uploadToFirebase(data) {
  const docId = `${data.id}_${data.bibNumber}`;
  const docRef = firestore.collection("scans_spring_2026").doc(docId);
  try {
    const isNew = await firestore.runTransaction(async (transaction) => {
      const docSnap = await transaction.get(docRef);
      if (docSnap.exists) {
        return false; // すでに存在する場合は書き込まない
      }
      transaction.set(docRef, data);
      return true;
    });

    if (!isNew) {
      document.getElementById('message').textContent = `${data.bibNumber} は読取済`;
    } else {
      document.getElementById('message').textContent = `${data.bibNumber} 保存完了`;
      // リタイヤ時の追加ブロードキャスト処理
      if (String(data.id) === '99') {
        firestore.collection('broadcast').doc('latest_retire').set({
          bibNumber: data.bibNumber, runnerName: data.runnerName, locationName: data.name, time: data.time, staff: data.staff, timestamp: firebase.firestore.FieldValue.serverTimestamp()
        }).catch(err => console.error("Broadcast送信エラー:", err));
      }
    }
  } catch (error) { 
    console.error("Firebase保存エラー:", error);
    document.getElementById('message').textContent = `保存失敗`; 
  } finally {
    // 修正：結果を1.5秒見せてからスキャナー再開
    setTimeout(startScanner, 1500);
  }
}

function showCustomPopup({ title = "", message = "", buttons = [], callback = null }) {
  const overlay = document.getElementById('popup-overlay');
  const popup = document.getElementById('popup');
  document.getElementById('popup-title').textContent = title;
  document.getElementById('popup-title').style.color = (title === "エラー" ? "red" : ""); 
  document.getElementById('popup-info').innerHTML = message;

  popup.querySelectorAll('button').forEach(btn => btn.remove());
  buttons.forEach(({ text, value }) => {
    const btn = document.createElement('button');
    btn.textContent = text;
    btn.onclick = () => { overlay.style.display = 'none'; if (callback) callback(value); };
    popup.appendChild(btn);
  });
  overlay.style.display = 'flex';
}

let lastProcessedRetireTime = 0; 
const appStartTime = new Date().getTime() - (5 * 60 * 1000); 

function startRetireListener() {
  firestore.collection('broadcast').doc('latest_retire').onSnapshot((doc) => {
    if (!doc.exists) return;
    const d = doc.data();
    let alertTime = d.timestamp ? d.timestamp.toMillis() : new Date().getTime();
    const now = new Date().getTime();
    if (alertTime > appStartTime && (now - alertTime) < 10 * 60 * 1000 && alertTime > lastProcessedRetireTime) {
      lastProcessedRetireTime = alertTime;
      if (navigator.vibrate) navigator.vibrate([500, 200, 500, 200, 500]); 
      showCustomPopup({
        title: "⚠ リタイヤ速報",
        message: `<div style="text-align:center; margin: 10px 0;"><span style="font-size:32px; color:red; font-weight:bold;">No.${d.bibNumber}</span><br><span style="font-size:24px; font-weight:bold;">${d.runnerName} </span><hr style="margin:10px 0;"><div style="font-size:18px; color:#333;">場所: <strong>${d.locationName}</strong><br>担当: ${d.staff}<br><span style="font-size:14px; color:#888;">${d.time}</span></div></div>`,
        buttons: [{ text: "確認しました", value: true }]
      });
    }
  }, (error) => { console.error("速報リスナーエラー:", error); });
}

try {
  firebase.initializeApp(firebaseConfig);
  firestore = firebase.firestore();
  firestore.enablePersistence({ synchronizeTabs: true }).catch((err) => {

      showCustomPopup({
        title: "⚠ 警告",

      });
      document.getElementById('message').textContent = '⚠ 複数タブエラー';
      document.getElementById('message').style.color = 'red';
    }
  });
  setTimeout(() => { initializeAppLogic(); startRetireListener(); }, 300);
} catch (e) {
  alert("初期化失敗"); initializeAppLogic();
}
