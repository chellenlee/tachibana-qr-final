<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>橘湾岸ＱＲ2026春 - Excelリザルト出力</title>
  <style>
    body { font-family: sans-serif; padding: 30px; background: #f0f4f8; color: #333; text-align: center; }
    h1 { color: #003366; }
    p { font-size: 16px; margin-bottom: 30px; color: #555; }
    #dl-btn { 
      background: linear-gradient(#28a745, #1e7e34); color: white; padding: 15px 30px; 
      border: none; border-radius: 8px; font-size: 20px; font-weight: bold; cursor: pointer; 
      box-shadow: 0 5px 10px rgba(0,0,0,0.2); transition: 0.2s;
    }
    #dl-btn:hover { background: linear-gradient(#218838, #19692c); transform: translateY(-2px); }
    #dl-btn:active { transform: translateY(2px); box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
    #status { margin-top: 20px; font-size: 18px; font-weight: bold; color: #003366; }
  </style>
</head>
<body>

  <h1>橘湾岸ＱＲ2026春 - Excelリザルト出力</h1>
  <p>全データを解析し、自動計算関数（RANK等）を埋め込んだExcelファイル(.xlsx)を出力します。</p>
  
  <button id="dl-btn" onclick="generateExcel()">📊 Excelファイルを作成してダウンロード</button>
  
  <div id="status"></div>

  <!-- Firebase Scripts -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
  <!-- 本物のExcel(.xlsx)を生成するためのライブラリ -->
  <script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>
  
  <script>
    // ※アプリと同じFirebaseの設定を記述してください
    const firebaseConfig = {
      apiKey: "AIzaSyD_Aic5iQ7OYGO9qTv0patspCKbwsuYcs8",
      authDomain: "tachibana-wangan.firebaseapp.com",
      projectId: "tachibana-wangan",
      storageBucket: "tachibana-wangan.firebasestorage.app",
      messagingSenderId: "963128842192",
      appId: "1:963128842192:web:5ee0eb05d3df5e7c63cbd5"
    };
    
    firebase.initializeApp(firebaseConfig);
    const firestore = firebase.firestore();

    function getEffectiveStartTime(docs) {
      let startDoc = docs.find(d => String(d.id) === "2");
      if (startDoc && startDoc.scanTimestamp) {
        let sDate = startDoc.scanTimestamp.toDate();
        let startH = sDate.getHours();
        let startM = sDate.getMinutes();
        if (startM >= 11) startH += 1;
        let roundedStart = new Date(sDate);
        roundedStart.setHours(startH, 0, 0, 0);
        return { time: roundedStart, isKari: false, label: `${String(startH).padStart(2, '0')}:00` };
      }
      let anyDoc = docs[0];
      if (anyDoc && anyDoc.qrStartTime) {
        let earliestDoc = docs.reduce((prev, curr) => {
          let pt = prev.scanTimestamp ? prev.scanTimestamp.toMillis() : Infinity;
          let ct = curr.scanTimestamp ? curr.scanTimestamp.toMillis() : Infinity;
          return pt < ct ? prev : curr;
        }, docs[0]);
        if (earliestDoc && earliestDoc.scanTimestamp) {
          let baseDate = earliestDoc.scanTimestamp.toDate();
          let [qH, qM] = anyDoc.qrStartTime.split(':').map(Number);
          let kariDate = new Date(baseDate);
          kariDate.setHours(qH, qM, 0, 0);
          if (kariDate > baseDate) { kariDate.setDate(kariDate.getDate() - 1); }
          return { time: kariDate, isKari: true, label: `${anyDoc.qrStartTime}(仮)` };
        }
      }
      return { time: null, isKari: false, label: "Start無" };
    }

    function formatTime(dateObj) {
      if (!dateObj) return "";
      const d = new Date(dateObj);
      const D = d.getDate();
      const h = String(d.getHours()).padStart(2, '0');
      const m = String(d.getMinutes()).padStart(2, '0');
      const s = String(d.getSeconds()).padStart(2, '0');
      return `${D}日 ${h}:${m}:${s}`;
    }

    // 列番号(0,1,2...)をExcelの列アルファベット(A,B,C...)に変換する関数
    function getColLetter(index) {
      let letter = '';
      while (index >= 0) {
        letter = String.fromCharCode((index % 26) + 65) + letter;
        index = Math.floor(index / 26) - 1;
      }
      return letter;
    }

    async function generateExcel() {
      const statusDiv = document.getElementById('status');
      statusDiv.innerHTML = '📥 データを取得・解析中... しばらくお待ちください。';
      statusDiv.style.color = '#003366';
      
      try {
        const locSnap = await firestore.collection("locations_master_spring").orderBy("id", "asc").get();
        let locations = [];
        locSnap.forEach(doc => locations.push(doc.data()));
        
        const scanSnap = await firestore.collection('scans_spring_2026').get();
        if (scanSnap.empty) {
          statusDiv.innerHTML = '❌ データが見つかりませんでした。';
          statusDiv.style.color = 'red';
          return;
        }
        
        const runnerMap = new Map();
        scanSnap.forEach(doc => {
          const d = doc.data();
          const bib = d.bibNumber;
          if (!runnerMap.has(bib)) runnerMap.set(bib, { docs: [] });
          runnerMap.get(bib).docs.push(d);
        });
        
        const deptLocs = {};
        const goalLocations = {};
        const waypointsDict = {};
        const targetDivisions = ['E', 'L', 'M', 'S']; 
        
        targetDivisions.forEach(div => {
          let locsForDiv = locations.filter(l => l.divisions && l.divisions.includes(div) && String(l.id) !== "1" && String(l.id) !== "99");
          locsForDiv.sort((a, b) => (a.distances[div] || 0) - (b.distances[div] || 0)); 
          deptLocs[div] = locsForDiv;
          goalLocations[div] = locsForDiv[locsForDiv.length - 1]; 
          waypointsDict[div] = locsForDiv.filter(l => String(l.id) !== "2" && String(l.id) !== String(goalLocations[div].id));
        });
        
        let runnersList = [];
        runnerMap.forEach((entry, bib) => {
          const docs = entry.docs;
          const firstDoc = docs[0];
          const division = firstDoc.division;
          if (!targetDivisions.includes(division)) return; 
          
          let effStart = getEffectiveStartTime(docs);
          let isRetire = docs.some(d => String(d.id) === "99");
          let maxLocIndex = -1;
          let maxLocTimeMs = 0;
          let goalTimeMs = null;
          let goalTimeObj = null;
          
          let locTimes = {};
          let divLocs = deptLocs[division];
          let goalLocId = goalLocations[division] ? String(goalLocations[division].id) : null;
          
          divLocs.forEach((loc, index) => {
            let scan = docs.find(d => String(d.id) === String(loc.id));
            if (scan && scan.scanTimestamp) {
              let ts = scan.scanTimestamp.toMillis();
              locTimes[loc.id] = scan.scanTimestamp.toDate();
              if (index > maxLocIndex) {
                maxLocIndex = index;
                maxLocTimeMs = ts; 
              }
              if (String(loc.id) === goalLocId) {
                goalTimeMs = ts;
                goalTimeObj = scan.scanTimestamp.toDate();
              }
            } else {
              locTimes[loc.id] = null;
            }
          });
          
          let isFinisher = false;
          let elapsedMs = 0;
          let isDNF = true;
          
          if (goalTimeMs && !isRetire && effStart.time) {
            isFinisher = true;
            isDNF = false;
            elapsedMs = goalTimeMs - effStart.time.getTime();
          }
          
          let startStr = effStart.time ? formatTime(effStart.time) : "Start無";
          if (effStart.isKari) startStr += "(仮)";
          
          // 性別データの表記ゆれをExcel用の数式で使いやすいよう「男」「女」に統一
          let rawGender = firstDoc.gender || "";
          let genderExcel = rawGender;
          if(rawGender === "M" || rawGender === "male" || rawGender === "男子") genderExcel = "男";
          if(rawGender === "F" || rawGender === "female" || rawGender === "女子") genderExcel = "女";

          runnersList.push({
            bib: bib, name: firstDoc.runnerName, division: division, gender: genderExcel,
            startStr: startStr, locTimes: locTimes, goalTimeObj: goalTimeObj,
            isFinisher: isFinisher, isDNF: isDNF, elapsedMs: elapsedMs,
            maxLocIndex: maxLocIndex, maxLocTimeMs: maxLocTimeMs
          });
        });
        
        const wb = XLSX.utils.book_new();
        
        targetDivisions.forEach(div => {
          let divRunners = runnersList.filter(r => r.division === div);
          if (divRunners.length === 0) return;
          
          // 初期の並び順（完走者を上に、DNFは進んだ距離が長い順に下へ）
          divRunners.sort((a, b) => {
            if (a.isFinisher && !b.isFinisher) return -1; 
            if (!a.isFinisher && b.isFinisher) return 1;
            if (a.isFinisher && b.isFinisher) return a.elapsedMs - b.elapsedMs;
            if (a.maxLocIndex !== b.maxLocIndex) return b.maxLocIndex - a.maxLocIndex; 
            return a.maxLocTimeMs - b.maxLocTimeMs; 
          });
          
          let waypoints = waypointsDict[div] || [];
          let excelData = [];
          
          // 【ヘッダー行の作成】
          let headerRow = ["総合順位", "男子順位", "女子順位", "ゼッケン", "氏名", "性別", "スタート時間"];
          waypoints.forEach(wp => { headerRow.push(wp.name); });
          headerRow.push("ゴール", "経過時間");
          excelData.push(headerRow);
          
          // 列の位置を自動計算
          let genderCol = "F"; // 性別はF列固定
          let timeColIndex = headerRow.length - 1; // 経過時間は一番最後の列
          let timeCol = getColLetter(timeColIndex); // "S"や"Z"などのアルファベットを取得
          let lastRow = divRunners.length + 1; // ヘッダーが1行目なのでデータ末尾の行数
          
          // 【データ行の作成（関数の埋め込み）】
          divRunners.forEach((r, index) => {
            let rowNum = index + 2; // 現在の行番号（2行目からスタート）

            // Excelに埋め込むための高度な順位計算式
            let f_overall = `IF(ISTEXT(${timeCol}${rowNum}), "-", RANK(${timeCol}${rowNum}, ${timeCol}$2:${timeCol}$${lastRow}, 1))`;
            let f_male = `IF(OR(ISTEXT(${timeCol}${rowNum}), ${genderCol}${rowNum}<>"男"), "-", COUNTIFS(${genderCol}$2:${genderCol}$${lastRow}, "男", ${timeCol}$2:${timeCol}$${lastRow}, "<"&${timeCol}${rowNum}) + 1)`;
            let f_female = `IF(OR(ISTEXT(${timeCol}${rowNum}), ${genderCol}${rowNum}<>"女"), "-", COUNTIFS(${genderCol}$2:${genderCol}$${lastRow}, "女", ${timeCol}$2:${timeCol}$${lastRow}, "<"&${timeCol}${rowNum}) + 1)`;

            let row = [
              { t: 'n', f: f_overall }, // A列: 総合順位 (RANK関数)
              { t: 'n', f: f_male },    // B列: 男子順位 (COUNTIFS関数)
              { t: 'n', f: f_female },  // C列: 女子順位 (COUNTIFS関数)
              r.bib,
              r.name,
              r.gender,
              r.startStr
            ];

            // 各地点の通過時間
            waypoints.forEach(wp => {
              row.push(r.locTimes[wp.id] ? formatTime(r.locTimes[wp.id]) : "");
            });
            row.push(r.goalTimeObj ? formatTime(r.goalTimeObj) : "");

            // 経過時間（計算可能にするため、文字列ではなく「シリアル値(数値)」で出力）
            if (r.isDNF) {
              row.push({ t: 's', v: 'DNF' });
            } else {
              let timeValue = r.elapsedMs / (1000 * 60 * 60 * 24); // Excelの「1日=1」の数値に変換
              row.push({ t: 'n', v: timeValue, z: '[h]:mm:ss' }); // Excel上で 01:23:45 と表示させる
            }

            excelData.push(row);
          });
          
          // シート作成と追加
          const ws = XLSX.utils.aoa_to_sheet(excelData);
          XLSX.utils.book_append_sheet(wb, ws, `${div}部門`);
        });
        
        // xlsxの生成とダウンロード
        XLSX.writeFile(wb, "橘湾岸QR_リザルト.xlsx");
        
        statusDiv.innerHTML = '✅ Excelファイルのダウンロードが完了しました！';
        statusDiv.style.color = 'green';
        
      } catch (error) {
        console.error("集計エラー", error);
        statusDiv.innerHTML = '❌ エラーが発生しました。コンソールを確認してください。';
        statusDiv.style.color = 'red';
      }
    }
  </script>
</body>
</html>
